---
- name: Auto-remediate OpenShift Pod CrashLoopBackOff
  hosts: localhost
  sources:
    - name: listen for alerts
      ansible.eda.alertmanager:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Catch CrashLoopBackOff and Trigger Recovery
      condition: event.alert.labels.alertname == "KubePodCrashLooping" and event.alert.status == "firing"
      action:
        run_job_template:
          name: "Recover-Crashloop-Pod"
          organization: "Default"
          job_args:
            extra_vars:
              pod_name: "{{ event.alert.labels.pod }}"
              namespace: "{{ event.alert.labels.namespace }}"
